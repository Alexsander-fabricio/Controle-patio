    function decodeJwt(token) {
      try {
        const payload = token.split(".")[1];
        const json = atob(payload.replace(/-/g, "+").replace(/_/g, "/"));
        return JSON.parse(json);
      } catch (e) {
        return null;
      }
    }

    const QUEUE_KEY = "patio_fila_offline";

    function getQueue() {
      try {

      } catch (e) {
        return [];
      }

    function saveQueue(queue) {
      localStorage.setItem(QUEUE_KEY, JSON.stringify(queue));
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function base64ToBlob(dataUrl) {
      const [meta, base64] = dataUrl.split(",");
      const mimeMatch = meta.match(/:(.*?);/);
      const mime = mimeMatch ? mimeMatch[1] : "application/pdf";
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return new Blob([bytes], { type: mime });
    }

    function Dashboard({ records, recusados = [] }) {
      const diaChartRef = useRef(null);
      const transpChartRef = useRef(null);
      const produtoChartRef = useRef(null);
      const chartsInstances = useRef({});
      const [chartLibLoaded, setChartLibLoaded] = useState(!!window.Chart);

      const total = records.length;
      const confirmados = records.filter((r) => r.confirmado).length;

      // Tempo médio parado (descarga - chegada), em minutos
      const tempos = records
        .map((r) => {
          if (!r.chegada || !r.descarga) return null;
          const diff = (new Date(r.descarga) - new Date(r.chegada)) / 60000;
          return diff >= 0 ? diff : null;
        })
        .filter((v) => v !== null);
      const mediaMin = tempos.length ? Math.round(tempos.reduce((a, b) => a + b, 0) / tempos.length) : 0;
      const formatMin = (m) => {
        const h = Math.floor(m / 60);
        const min = m % 60;
        return h > 0 ? `${h}h${String(min).padStart(2, "0")}` : `${min}min`;
      };

      // Valor a pagar em estadias: taxa (por registro) x toneladas x (horas paradas - 12 primeiras horas, sem contar)
      const valorTotalEstadias = records.reduce((total, r) => {
        if (!r.chegada || !r.descarga || !r.peso_toneladas) return total;
        const horasParadas = (new Date(r.descarga) - new Date(r.chegada)) / 3600000;
        const horasExcedentes = Math.max(0, horasParadas - 12);
        const taxa = r.taxa_estadia != null ? Number(r.taxa_estadia) : 0.8;
        return total + horasExcedentes * Number(r.peso_toneladas) * taxa;
      }, 0);
      const formatBRL = (v) =>
        "R$ " + v.toLocaleString("pt-BR", { minimumFractionDigits: 2, maximumFractionDigits: 2 });

      // Destino com mais recusas
      const recusasPorDestino = {};
      recusados.forEach((r) => {
        if (!r.destino) return;
        recusasPorDestino[r.destino] = (recusasPorDestino[r.destino] || 0) + 1;
      });
      const destinoMaisRecusas = Object.entries(recusasPorDestino).sort((a, b) => b[1] - a[1])[0] || null;

      // Registros por produto
      const porProduto = PRODUCTS.map((p) => ({
        ...p,
        count: records.filter((r) => r.produto === p.id).length,
      }));

      // Registros por dia (últimos 14 dias)
      const dias = [];
      for (let i = 13; i >= 0; i--) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        dias.push(d);
      }
      const labelsDias = dias.map((d) => `${String(d.getDate()).padStart(2, "0")}/${String(d.getMonth() + 1).padStart(2, "0")}`);
      const countsDias = dias.map((d) => {
        const dStr = d.toDateString();
        return records.filter((r) => r.enviado_em && new Date(r.enviado_em).toDateString() === dStr).length;
      });

      // Top transportadoras
      const porTransp = {};
      records.forEach((r) => {
        if (!r.transportadora) return;
        porTransp[r.transportadora] = (porTransp[r.transportadora] || 0) + 1;
      });
      const topTransp = Object.entries(porTransp)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 6);

      useEffect(() => {
        if (!window.Chart) return;
        setChartLibLoaded(true);

        Object.values(chartsInstances.current).forEach((c) => c && c.destroy());

        if (diaChartRef.current) {
          chartsInstances.current.dia = new window.Chart(diaChartRef.current, {
            type: "bar",
            data: {
              labels: labelsDias,
              datasets: [{ data: countsDias, backgroundColor: "#3F6B4F" }],
            },
            options: {
              plugins: { legend: { display: false } },
              scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } },
            },
          });
        }

        if (transpChartRef.current && topTransp.length > 0) {
          chartsInstances.current.transp = new window.Chart(transpChartRef.current, {

            data: {
              labels: topTransp.map(([nome]) => nome),
              datasets: [{ data: topTransp.map(([, c]) => c), backgroundColor: "#4C6B80" }],
            },
            options: {
              indexAxis: "y",
              plugins: { legend: { display: false } },
              scales: { x: { beginAtZero: true, ticks: { stepSize: 1 } } },
            },
          });
        }

        if (produtoChartRef.current) {
          chartsInstances.current.produto = new window.Chart(produtoChartRef.current, {
            type: "doughnut",
            data: {
              labels: porProduto.map((p) => p.label),
              datasets: [{ data: porProduto.map((p) => p.count), backgroundColor: porProduto.map((p) => p.color) }],
            },
            options: { plugins: { legend: { position: "bottom", labels: { boxWidth: 12, font: { size: 11 } } } } },
          });
        }

        return () => Object.values(chartsInstances.current).forEach((c) => c && c.destroy());
      }, [records]);

      if (total === 0) {
        return (

            Sem dados ainda para mostrar no dashboard.
          </p>
        );

      return (

          <div className="rounded-md py-4 px-4 mb-4 text-center" style={{ background: "#3F6B4F" }}>
            <p style={{ color: "#FFFFFF", fontWeight: "700" }} className="text-2xl">{formatBRL(valorTotalEstadias)}</p>
            <p style={{ color: "#DFE6DE" }} className="text-[11px] uppercase mt-1">
              Total a pagar em estadias (taxa × ton × horas acima de 12h)
            </p>
          </div>

          {/* Summary cards */}
          <div className="grid grid-cols-2 gap-2 mb-5">
            <div className="rounded-md py-3 px-3" style={{ background: "#FFFFFF", border: `1px solid ${RULE}` }}>
              <p style={{ color: INK, fontWeight: "600" }} className="text-xl">{total}</p>
              <p style={{ color: INK_SOFT }} className="text-[11px] uppercase">Total de registros</p>
            </div>
            <div className="rounded-md py-3 px-3" style={{ background: "#FFFFFF", border: `1px solid ${RULE}` }}>
              <p style={{ color: INK, fontWeight: "600" }} className="text-xl">{formatMin(mediaMin)}</p>
              <p style={{ color: INK_SOFT }} className="text-[11px] uppercase">Tempo médio parado</p>
            </div>
            <div className="rounded-md py-3 px-3" style={{ background: "#FFFFFF", border: `1px solid ${RULE}` }}>
              <p style={{ color: "#3F6B4F", fontWeight: "600" }} className="text-xl">{confirmados}</p>
              <p style={{ color: INK_SOFT }} className="text-[11px] uppercase">Confirmados</p>
            </div>
            <div className="rounded-md py-3 px-3" style={{ background: "#FFFFFF", border: `1px solid ${RULE}` }}>
              <p style={{ color: "#8A6A1F", fontWeight: "600" }} className="text-xl">{total - confirmados}</p>
              <p style={{ color: INK_SOFT }} className="text-[11px] uppercase">Pendentes</p>
            </div>
            <div className="rounded-md py-3 px-3 col-span-2" style={{ background: "#F3E1DA", border: "1px solid #D9A896" }}>
              <p style={{ color: "#A8442B", fontWeight: "600" }} className="text-lg">
                {destinoMaisRecusas ? `${destinoMaisRecusas[0]} (${destinoMaisRecusas[1]})` : "—"}
              </p>
              <p style={{ color: "#8A4A38" }} className="text-[11px] uppercase">Destino com mais recusas</p>
            </div>
          </div>

          {/* Registros por dia */}
          <div className="rounded-md p-3 mb-4" style={{ background: "#FFFFFF", border: `1px solid ${RULE}` }}>
            <p style={{ color: INK_SOFT }} className="text-[11px] uppercase mb-2">Registros por dia (últimos 14 dias)</p>
            {!chartLibLoaded && (
              <p style={{ color: "#A8442B" }} className="text-xs mb-2">
                ⚠️ Biblioteca de gráficos não carregou (verifique a conexão e recarregue a página)
              </p>
            )}
            <div style={{ height: 180 }}>
              <canvas ref={diaChartRef}></canvas>
            </div>
          </div>

          {/* Por produto */}
          <div className="rounded-md p-3 mb-4" style={{ background: "#FFFFFF", border: `1px solid ${RULE}` }}>
            <p style={{ color: INK_SOFT }} className="text-[11px] uppercase mb-2">Por produto</p>
            <div style={{ height: 200 }}>
              <canvas ref={produtoChartRef}></canvas>
            </div>
          </div>

          {/* Top transportadoras */}
          {topTransp.length > 0 && (
            <div className="rounded-md p-3" style={{ background: "#FFFFFF", border: `1px solid ${RULE}` }}>
              <p style={{ color: INK_SOFT }} className="text-[11px] uppercase mb-2">Top transportadoras</p>
              <div style={{ height: Math.max(120, topTransp.length * 36) }}>
                <canvas ref={transpChartRef}></canvas>
              </div>
            </div>
          )}
        </div>
      );
    }

    function Historico({ accessToken }) {
      const [logs, setLogs] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        (async () => {
          setLoading(true);
          try {
            const res = await supabaseFetch("/rest/v1/historico_alteracoes?select=*&order=criado_em.desc&limit=200", {
              headers: { Authorization: `Bearer ${accessToken}` },
            });
            setLogs(await res.json());
          } catch (e) {
            setLogs([]);
          } finally {
            setLoading(false);
          }
        })();
      }, [accessToken]);

      const acaoLabel = {
        confirmar: "✓ Confirmou",
        desconfirmar: "↩️ Desconfirmou",
        remover: "❌ Recusou",
        reativar: "♻️ Reativou",
        excluir_permanente: "❌ Excluiu permanente",
        editar_taxa: "💰 Editou taxa",
      };

      if (loading) return <p style={{ color: INK_SOFT }} className="text-center py-8 text-sm">Carregando histórico...</p>;
      if (logs.length === 0) return <p style={{ color: INK_SOFT }} className="text-center py-8 text-sm">Nenhuma alteração registrada ainda.</p>;

      return (
        <div className="space-y-2">
          {logs.map((log) => (
            <div key={log.id} className="rounded-md px-3 py-2.5" style={{ background: "#FFFFFF", border: `1px solid ${RULE}` }}>
              <div className="flex items-center justify-between">
                <span style={{ color: INK, fontWeight: "600" }} className="text-xs">
                  {acaoLabel[log.acao] || log.acao}
                </span>
                <span style={{ color: INK_SOFT }} className="text-[10px]">
                  {new Date(log.criado_em).toLocaleString("pt-BR")}
                </span>
              </div>
              <p style={{ color: INK_SOFT }} className="text-[11px] mt-0.5">
                por {log.user_email || "desconhecido"} {log.registro_numero ? `· Registro Nº ${log.registro_numero}` : ""}
              </p>
              {log.detalhes && (
                <p style={{ color: INK_SOFT }} className="text-[11px] mt-0.5 italic">{log.detalhes}</p>
              )}
            </div>
          ))}
        </div>
      );
    }

    function PatioApp() {
      const [form, setForm] = useState(EMPTY_FORM);
      const [file, setFile] = useState(null);
      const [gps, setGps] = useState(null);
      const [gpsStatus, setGpsStatus] = useState("idle");
      const [lastTicket, setLastTicket] = useState(null);
      const [history, setHistory] = useState([]);
      const [errors, setErrors] = useState([]);
      const fileInputRef = useRef(null);

      const [view, setView] = useState("motorista");
      const [authenticated, setAuthenticated] = useState(false);
      const [accessToken, setAccessToken] = useState(null);
      const [currentUser, setCurrentUser] = useState(null);
      const [emailInput, setEmailInput] = useState("");
      const [passwordInput, setPasswordInput] = useState("");
      const [loginError, setLoginError] = useState("");
      const [loggingIn, setLoggingIn] = useState(false);
      const [submitting, setSubmitting] = useState(false);
      const [submitError, setSubmitError] = useState("");
      const [remoteRecords, setRemoteRecords] = useState([]);
      const [loadingRecords, setLoadingRecords] = useState(false);
      const [pendingCount, setPendingCount] = useState(0);
      const [syncing, setSyncing] = useState(false);
      const [gestorTab, setGestorTab] = useState("pendentes");
      const [editingTaxaId, setEditingTaxaId] = useState(null);
      const [editingTaxaValue, setEditingTaxaValue] = useState("");

      const update = (key) => (e) => setForm((f) => ({ ...f, [key]: e.target.value }));

      const captureGps = () => {
        setGpsStatus("loading");
        if (!navigator.geolocation) {
          setGpsStatus("error");
          return;
        }
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            setGps({
              lat: pos.coords.latitude.toFixed(5),
              lng: pos.coords.longitude.toFixed(5),
            });
            setGpsStatus("ok");
          },
          () => setGpsStatus("error"),
          { timeout: 8000 }
        );
      };

      const handleLogin = async () => {
        if (!emailInput || !passwordInput) {
          setLoginError("Preencha e-mail e senha.");
          return;
        }
        setLoggingIn(true);
        setLoginError("");
        try {
          const res = await supabaseFetch("/auth/v1/token?grant_type=password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: emailInput, password: passwordInput }),
          });
          const data = await res.json();
          setAccessToken(data.access_token);
          const payload = decodeJwt(data.access_token);
          setCurrentUser(payload ? { id: payload.sub, email: payload.email } : null);
          setAuthenticated(true);
          setPasswordInput("");
        } catch (err) {
          setLoginError("E-mail ou senha incorretos.");
        } finally {
          setLoggingIn(false);
        }
      };

      const fetchRecords = async (token) => {
        setLoadingRecords(true);
        try {
          const res = await supabaseFetch("/rest/v1/registros_patio?select=*&order=enviado_em.desc", {
            headers: { Authorization: `Bearer ${token}` },
          });
          const data = await res.json();
          setRemoteRecords(data);
        } catch (err) {
          setRemoteRecords([]);
        } finally {
          setLoadingRecords(false);
        }
      };

      useEffect(() => {
        if (authenticated && accessToken) fetchRecords(accessToken);
      }, [authenticated, accessToken]);

      const requiredFields = [
        "produto",
        "tipo",
        ...(form.tipo === "retorno" ? [] : ["chegada", "descarga"]),
        "nfe",
        "cte",
        "viagem",
        "centro",
        "peso",
        "transportadora",
        "motorista",
        "telefone",
        "placa",
        "uf",
        "origem",
        "destino",
        "motivo",
      ];

      const handleSubmit = async () => {
        const missing = requiredFields.filter((k) => !form[k]);
        if (!file) missing.push("anexo");
        if (missing.length) {
          setErrors(missing);
          return;
        }
        setErrors([]);
        setSubmitError("");
        setSubmitting(true);

        if (gpsStatus !== "ok") captureGps();

        const finalizarLocal = (offline) => {
          const ticket = {
            numero: new Date().toISOString().slice(0, 16).replace("T", " "),
            enviadoEm: new Date().toLocaleString("pt-BR"),
            gps,
            arquivo: file ? file.name : "(nenhum anexo)",
            offline,
            ...form,
          };
          setLastTicket(ticket);
          setHistory((h) => [ticket, ...h].slice(0, 5));
          setForm(EMPTY_FORM);
          setFile(null);
          setGps(null);
          setGpsStatus("idle");
          if (fileInputRef.current) fileInputRef.current.value = "";
        };

        // Sem internet: guarda direto na fila do celular, nem tenta a rede
        if (!navigator.onLine) {
          try {
            const fileBase64 = file ? await fileToBase64(file) : null;
            const queue = getQueue();
            queue.push({
              id: Date.now() + Math.random(),
              form,
              gps,
              fileBase64,
              fileName: file ? file.name : null,
            });
            saveQueue(queue);
            setPendingCount(queue.length);
            finalizarLocal(true);
          } catch (err) {
            setSubmitError("Não foi possível guardar o registro no celular. Tente novamente.");
          } finally {
            setSubmitting(false);
          }
          return;
        }

        // Com internet: tenta enviar direto; se falhar, cai pra fila offline
        try {
          await enviarParaServidor(form, file, file ? file.name : null, gps);
          finalizarLocal(false);
        } catch (err) {
          try {
            const fileBase64 = file ? await fileToBase64(file) : null;
            const queue = getQueue();
            queue.push({
              id: Date.now() + Math.random(),
              form,
              gps,
              fileBase64,
              fileName: file ? file.name : null,
            });
            saveQueue(queue);
            setPendingCount(queue.length);
            finalizarLocal(true);
          } catch (err2) {
            setSubmitError("Não foi possível enviar nem guardar o registro. Verifique o espaço/permissões do celular e tente novamente.");
          }
        } finally {
          setSubmitting(false);
        }
      };

      const sincronizarPendentes = async () => {
        if (!navigator.onLine) return;
        let queue = getQueue();
        if (queue.length === 0) return;
        setSyncing(true);
        const restantes = [];
        for (const item of queue) {
          try {
            const fileBlob = item.fileBase64 ? base64ToBlob(item.fileBase64) : null;
            await enviarParaServidor(item.form, fileBlob, item.fileName, item.gps);
          } catch (err) {
            restantes.push(item); // mantém na fila pra tentar de novo depois
          }
        }
        saveQueue(restantes);
        setPendingCount(restantes.length);
        setSyncing(false);
      };

      useEffect(() => {
        setPendingCount(getQueue().length);
        sincronizarPendentes();
        window.addEventListener("online", sincronizarPendentes);
        return () => window.removeEventListener("online", sincronizarPendentes);
      }, []);

      const selectedProduct = PRODUCTS.find((p) => p.id === form.produto);

      const inputStyle = {
        background: "#FFFFFF",
        border: `1.5px solid ${RULE}`,
        color: INK,
      };

      return (
        <div style={{ background: PAGE_BG }} className="min-h-screen w-full flex justify-center px-4 py-8">
          <div className="w-full max-w-md">
            {/* Header */}
            <div className="mb-6 text-center">
              <h1 style={{ color: INK, fontWeight: "600" }} className="text-3xl uppercase mb-1">
                Controle de Pátio
              </h1>
              <p style={{ color: INK_SOFT }} className="text-sm">
                Registro de estadia · carga de grãos e fertilizante
              </p>
            </div>

            {/* Tab switcher */}
            <div style={{ background: "#E2DFD3", border: `1px solid ${RULE}` }} className="flex rounded-md p-1 mb-6">
              <button
                onClick={() => setView("motorista")}
                className="flex-1 flex items-center justify-center gap-1.5 py-2 rounded text-sm font-medium transition-all"
                style={{
                  background: view === "motorista" ? CARD_BG : "transparent",
                  color: view === "motorista" ? INK : INK_SOFT,
                }}
              >
                🚚 Transportador
              </button>
              <button
                onClick={() => setView("gestor")}
                className="flex-1 flex items-center justify-center gap-1.5 py-2 rounded text-sm font-medium transition-all"
                style={{
                  background: view === "gestor" ? CARD_BG : "transparent",
                  color: view === "gestor" ? INK : INK_SOFT,
                }}
              >
                📊 Painel
              </button>
            </div>

            {/* Login gate */}
            {view === "gestor" && !authenticated && (
              <div className="relative mb-6">
                <Perforation top />
                <div style={{ background: CARD_BG, border: `1px solid ${RULE}` }} className="rounded-lg px-5 py-8 flex flex-col items-center text-center">
                  <h2 style={{ color: INK, fontWeight: "600" }} className="text-lg mb-1">
                    ÁREA DO GESTOR
                  </h2>
                  <p style={{ color: INK_SOFT }} className="text-xs mb-5">
                    Entre com o login cadastrado para ver todos os registros
                  </p>
                  <input
                    type="email"
                    placeholder="E-mail"
                    value={emailInput}
                    onChange={(e) => {
                      setEmailInput(e.target.value);
                      setLoginError("");
                    }}
                    className="w-full rounded-md px-3 py-2.5 text-center mb-2"
                    style={inputStyle}
                  />
                  <input
                    type="password"
                    placeholder="Senha"
                    value={passwordInput}
                    onChange={(e) => {
                      setPasswordInput(e.target.value);
                      setLoginError("");
                    }}
                    onKeyDown={(e) => e.key === "Enter" && handleLogin()}
                    className="w-full rounded-md px-3 py-2.5 text-center mb-3"
                    style={inputStyle}
                  />
                  {loginError && <p style={{ color: "#A8442B" }} className="text-xs mb-3">{loginError}</p>}
                  <button
                    onClick={handleLogin}
                    disabled={loggingIn}
                    className="w-full rounded-md py-3 font-semibold text-white"
                    style={{ background: "#3F6B4F", opacity: loggingIn ? 0.7 : 1 }}
                  >
                    {loggingIn ? "ENTRANDO..." : "ENTRAR"}
                  </button>
                </div>
                <Perforation />
              </div>
            )}

            {/* Manager panel */}
            {view === "gestor" && authenticated && (
              <div className="relative mb-6">
                <Perforation top />
                <div style={{ background: CARD_BG, border: `1px solid ${RULE}` }} className="rounded-lg px-5 pt-6 pb-6">
                  <div className="flex items-center justify-between mb-4">
                    <h2 style={{ color: INK, fontWeight: "600" }} className="text-lg">
                      PAINEL GESTOR
                    </h2>
                    <button onClick={() => { setAuthenticated(false); setAccessToken(null); setCurrentUser(null); setView("motorista"); }} className="text-xs" style={{ color: INK_SOFT }}>
                      Sair
                    </button>
                  </div>

                  <div style={{ background: "#E2DFD3", border: `1px solid ${RULE}` }} className="flex rounded-md p-1 mb-5">
                    <button
                      onClick={() => setGestorTab("pendentes")}
                      className="flex-1 py-1.5 rounded text-xs font-medium"
                      style={{
                        background: gestorTab === "pendentes" ? CARD_BG : "transparent",
                        color: gestorTab === "pendentes" ? INK : INK_SOFT,
                      }}
                    >
                      📋 Pendentes
                    </button>
                    <button
                      onClick={() => setGestorTab("confirmados")}
                      className="flex-1 py-1.5 rounded text-xs font-medium"
                      style={{
                        background: gestorTab === "confirmados" ? CARD_BG : "transparent",
                        color: gestorTab === "confirmados" ? INK : INK_SOFT,
                      }}
                    >
                      ✅ Confirmados
                    </button>
                    <button
                      onClick={() => setGestorTab("dashboard")}
                      className="flex-1 py-1.5 rounded text-xs font-medium"
                      style={{
                        background: gestorTab === "dashboard" ? CARD_BG : "transparent",
                        color: gestorTab === "dashboard" ? INK : INK_SOFT,
                      }}
                    >
                      📊 Dashboard
                    </button>
                    <button
                      onClick={() => setGestorTab("removidos")}
                      className="flex-1 py-1.5 rounded text-xs font-medium"
                      style={{
                        background: gestorTab === "removidos" ? CARD_BG : "transparent",
                        color: gestorTab === "removidos" ? INK : INK_SOFT,
                      }}
                    >
                      🗑️ Removidos
                    </button>
                    {currentUser?.id === ADMIN_UID && (
                      <button
                        onClick={() => setGestorTab("historico")}
                        className="flex-1 py-1.5 rounded text-xs font-medium"
                        style={{
                          background: gestorTab === "historico" ? CARD_BG : "transparent",
                          color: gestorTab === "historico" ? INK : INK_SOFT,

                        📜 Histórico
                      </button>
                    )}
                  </div>

                  {(() => {
                    const activeRecords = remoteRecords.filter((r) => r.ativo !== false);
                    const inactiveRecords = remoteRecords.filter((r) => r.ativo === false);
                    const pendentesRecords = activeRecords.filter((r) => !r.confirmado);
                    const confirmadosRecords = activeRecords.filter((r) => r.confirmado);
                    const listaAtual = gestorTab === "confirmados" ? confirmadosRecords : pendentesRecords;

                    const marcarAtivo = async (id, ativo, numero) => {
                      setRemoteRecords((recs) => recs.map((r) => (r.id === id ? { ...r, ativo } : r)));
                      try {
                        await supabaseFetch(`/rest/v1/registros_patio?id=eq.${id}`, {
                          method: "PATCH",
                          headers: { Authorization: `Bearer ${accessToken}`, "Content-Type": "application/json" },
                          body: JSON.stringify({ ativo }),
                        });
                        registrarHistorico(accessToken, id, numero, currentUser?.email, ativo ? "reativar" : "remover");
                      } catch (err) {
                        setRemoteRecords((recs) => recs.map((r) => (r.id === id ? { ...r, ativo: !ativo } : r)));
                      }
                    };

                    const excluirPermanente = async (id, numero) => {
                      if (!confirm("Excluir esse registro PERMANENTEMENTE? Essa ação não pode ser desfeita.")) return;
                      const backup = remoteRecords;
                      setRemoteRecords((recs) => recs.filter((r) => r.id !== id));
                      try {
                        await supabaseFetch(`/rest/v1/registros_patio?id=eq.${id}`, {
                          method: "DELETE",
                          headers: { Authorization: `Bearer ${accessToken}` },
                        });
                        registrarHistorico(accessToken, id, numero, currentUser?.email, "excluir_permanente");
                      } catch (err) {
                        setRemoteRecords(backup);
                        alert("Não foi possível excluir. Tente novamente.");
                      }
                    };

                    if (gestorTab === "dashboard") return <Dashboard records={activeRecords} recusados={inactiveRecords} />;

                    if (gestorTab === "historico") return <Historico accessToken={accessToken} />;

                    if (gestorTab === "removidos") {
                      return inactiveRecords.length === 0 ? (
                        <p style={{ color: INK_SOFT }} className="text-center py-8 text-sm">
                          Nenhum registro removido.
                        </p>
                      ) : (
                        <div className="space-y-2">
                          {inactiveRecords.map((h) => (
                            <div key={h.id} className="rounded-md px-3 py-3" style={{ background: "#F3E1DA", border: "1px solid #D9A896" }}>
                              <p style={{ color: INK_SOFT }} className="text-[11px] font-medium mb-1">Nº {h.numero}</p>
                              <p style={{ color: INK }} className="text-sm">
                                {h.transportadora} · {h.motorista} · {h.placa}
                              </p>
                              <p style={{ color: INK_SOFT }} className="text-[11px] mt-0.5">
                                {h.origem} → {h.destino} · NFe {h.nfe} · CTe {h.cte}
                              </p>
                              <div className="flex gap-2 mt-2">
                                <button
                                  onClick={() => marcarAtivo(h.id, true, h.numero)}
                                  className="text-[11px] px-2 py-1 rounded-full font-medium"
                                  style={{ background: "#FFFFFF", color: "#3F6B4F", border: "1.5px solid #3F6B4F" }}
                                >
                                  ♻️ Reativar
                                </button>
                                <button
                                  onClick={() => excluirPermanente(h.id, h.numero)}
                                  className="text-[11px] px-2 py-1 rounded-full font-medium"
                                  style={{ background: "#FFFFFF", color: "#A8442B", border: "1.5px solid #A8442B" }}
                                >
                                  ❌ Excluir permanente
                                </button>
                              </div>
                            </div>
                          ))}
                        </div>
                      );
                    }

                    return (
                  <>
                  {loadingRecords ? (
                    <p style={{ color: INK_SOFT }} className="text-center py-8 text-sm">
                      Carregando registros...
                    </p>
                  ) : listaAtual.length === 0 ? (
                    <p style={{ color: INK_SOFT }} className="text-center py-8 text-sm">
                      {gestorTab === "confirmados" ? "Nenhum registro confirmado ainda." : "Nenhum registro pendente."}
                    </p>
                  ) : (
                    <div className="space-y-2">
                      {listaAtual.map((h) => (
                        <div key={h.id} className="rounded-md px-3 py-3" style={{ background: h.confirmado ? "#F1F5F1" : "#FFFFFF", border: `1px solid ${h.confirmado ? "#3F6B4F" : RULE}` }}>
                          <div className="flex items-center justify-between mb-1.5">
                            <span
                              className="inline-block text-[10px] font-semibold uppercase px-2 py-0.5 rounded-full"
                              style={{
                                background: h.tipo_registro === "retorno" ? "#E4E9F2" : "#DFE6DE",
                                color: h.tipo_registro === "retorno" ? "#3A4F73" : "#3F6B4F",
                              }}
                            >
                              {h.tipo_registro === "retorno" ? "🔄 Retorno Filial" : "🅿️ Estadia"}
                            </span>
                            <span style={{ color: INK_SOFT }} className="text-[11px] font-medium">Nº {h.numero}</span>
                          </div>
                          <div className="flex items-start justify-between gap-2">
                            <p style={{ color: INK }} className="text-sm">
                              {h.transportadora} · {h.motorista} · {h.placa}
                            </p>
                            <div className="flex flex-col gap-1 items-end shrink-0">
                            <button
                              onClick={async () => {
                                const novoValor = !h.confirmado;
                                setRemoteRecords((recs) =>
                                  recs.map((r) => (r.id === h.id ? { ...r, confirmado: novoValor } : r))
                                );
                                try {
                                  await supabaseFetch(`/rest/v1/registros_patio?id=eq.${h.id}`, {
                                    method: "PATCH",
                                    headers: {
                                      Authorization: `Bearer ${accessToken}`,
                                      "Content-Type": "application/json",
                                    },
                                    body: JSON.stringify({ confirmado: novoValor }),
                                  });
                                  registrarHistorico(accessToken, h.id, h.numero, currentUser?.email, novoValor ? "confirmar" : "desconfirmar");
                                } catch (err) {
                                  setRemoteRecords((recs) =>
                                    recs.map((r) => (r.id === h.id ? { ...r, confirmado: !novoValor } : r))
                                  );
                                }
                              }}
                              className="shrink-0 text-[11px] px-2 py-1 rounded-full font-medium"
                              style={{
                                background: h.confirmado ? "#3F6B4F" : "#FFFFFF",
                                color: h.confirmado ? "#FFFFFF" : "#3F6B4F",
                                border: "1.5px solid #3F6B4F",
                              }}
                            >
                              {h.confirmado ? "✓ Confirmado" : "Confirmar"}
                            </button>
                            <button
                              onClick={() => marcarAtivo(h.id, false, h.numero)}
                              className="shrink-0 text-[11px] px-2 py-1 rounded-full font-medium"
                              style={{ background: "#FFFFFF", color: "#A8442B", border: "1.5px solid #A8442B" }}
                            >
                              RECUSADO
                            </button>
                            </div>
                          </div>
                          <p style={{ color: INK_SOFT }} className="text-[11px] mt-0.5">
                            {h.origem} → {h.destino} ({h.uf}) · NFe {h.nfe} · CTe {h.cte} · Centro {h.centro}
                          </p>
                          {h.telefone && (
                            <p style={{ color: INK_SOFT }} className="text-[11px]">
                              📱 {h.telefone} {h.peso_toneladas ? `· ⚖️ ${Number(h.peso_toneladas).toLocaleString("pt-BR", { minimumFractionDigits: 2 })} ton` : ""}
                            </p>
                          )}
                          {h.tipo_registro !== "retorno" && (
                          <div className="flex items-center gap-1.5 mt-1">
                            <span style={{ color: INK_SOFT }} className="text-[11px]">💰 Taxa estadia:</span>
                            {editingTaxaId === h.id ? (
                              <>
                                <input
                                  autoFocus
                                  type="text"
                                  inputMode="decimal"
                                  value={editingTaxaValue}
                                  onChange={(e) => setEditingTaxaValue(e.target.value)}
                                  onKeyDown={async (e) => {
                                    if (e.key !== "Enter") return;
                                    const novaTaxa = parseFloat(editingTaxaValue.replace(",", ".")) || 0;
                                    const taxaAntiga = h.taxa_estadia ?? 0.8;
                                    setRemoteRecords((recs) => recs.map((r) => (r.id === h.id ? { ...r, taxa_estadia: novaTaxa } : r)));
                                    setEditingTaxaId(null);
                                    try {
                                      await supabaseFetch(`/rest/v1/registros_patio?id=eq.${h.id}`, {
                                        method: "PATCH",
                                        headers: { Authorization: `Bearer ${accessToken}`, "Content-Type": "application/json" },
                                        body: JSON.stringify({ taxa_estadia: novaTaxa }),
                                      });
                                      registrarHistorico(
                                        accessToken,
                                        h.id,
                                        h.numero,
                                        currentUser?.email,
                                        "editar_taxa",
                                        `De R$ ${Number(taxaAntiga).toLocaleString("pt-BR", { minimumFractionDigits: 2 })} para R$ ${novaTaxa.toLocaleString("pt-BR", { minimumFractionDigits: 2 })}`
                                      );
                                    } catch (err) {
                                      alert("Não foi possível salvar a taxa. Tente novamente.");
                                    }
                                  }}
                                  style={{ border: `1px solid ${RULE}`, borderRadius: 4, width: 64, padding: "1px 6px" }}
                                  className="text-[11px]"
                                />
                                <span style={{ color: INK_SOFT }} className="text-[11px]">(Enter p/ salvar)</span>
                              </>
                            ) : (
                              <button
                                onClick={() => {
                                  setEditingTaxaId(h.id);
                                  setEditingTaxaValue(String(h.taxa_estadia ?? 0.8).replace(".", ","));
                                }}
                                className="text-[11px] underline"
                                style={{ color: "#3F6B4F" }}
                              >
                                R$ {Number(h.taxa_estadia ?? 0.8).toLocaleString("pt-BR", { minimumFractionDigits: 2 })} (editar)
                              </button>
                            )}
                          </div>
                          )}
                          {h.motivo && <p style={{ color: INK_SOFT }} className="text-[11px] mt-1 italic">Motivo: {h.motivo}</p>}
                          {h.arquivo_url && (
                            <button
                              onClick={async () => {
                                try {
                                  const res = await supabaseFetch(
                                    `/storage/v1/object/sign/comprovantes/${encodeURIComponent(h.arquivo_url).replace(/%2F/g, "/")}`,
                                    {
                                      method: "POST",
                                      headers: {
                                        Authorization: `Bearer ${accessToken}`,
                                        "Content-Type": "application/json",
                                      },
                                      body: JSON.stringify({ expiresIn: 3600 }),
                                    }
                                  );
                                  const data = await res.json();
                                  window.open(`${SUPABASE_URL}/storage/v1${data.signedURL}`, "_blank");
                                } catch (err) {
                                  alert("Não foi possível abrir o anexo. Tente novamente.");
                                }
                              }}
                              className="text-[11px] mt-1.5 underline"
                              style={{ color: "#3F6B4F" }}
                            >
                              📎 Ver anexo
                            </button>
                          )}
                        </div>
                      ))}
                    </div>
                  )}
                  </>
                    );
                  })()}
                </div>
                <Perforation />
              </div>
            )}

            {/* Aviso de registros pendentes de sincronização */}
            {view === "motorista" && pendingCount > 0 && (
              <div
                className="flex items-center justify-between gap-2 rounded-md px-3 py-2.5 mb-4 text-xs"
                style={{ background: "#FBF0DC", color: "#8A6A1F", border: "1px solid #E0C270" }}
              >
                <span>
                  📴 {pendingCount} registro{pendingCount > 1 ? "s" : ""} aguardando envio (sem internet no momento do preenchimento)
                </span>
                <button
                  onClick={sincronizarPendentes}
                  disabled={syncing || !navigator.onLine}
                  className="shrink-0 underline font-medium"
                >
                  {syncing ? "Enviando..." : "Tentar agora"}
                </button>
              </div>
            )}

            {/* Form */}
            {view === "motorista" && (
              <div className="relative mb-6">
                <Perforation top />
                <div style={{ background: CARD_BG, border: `1px solid ${RULE}` }} className="rounded-lg px-5 pt-7 pb-6">
                  <div className="mb-5">
                    <p className="text-xs uppercase mb-2" style={{ color: INK_SOFT }}>
                      Tipo de produto
                    </p>
                    <div className="grid grid-cols-3 gap-2">
                      {PRODUCTS.map((p) => (
                        <button
                          key={p.id}
                          onClick={() => setForm((f) => ({ ...f, produto: p.id }))}
                          className="flex flex-col items-center gap-1.5 py-3 rounded-md"
                          style={{
                            background: form.produto === p.id ? p.color : "#FFFFFF",
                            border: `1.5px solid ${form.produto === p.id ? p.color : RULE}`,
                          }}
                        >
                          <span style={{ color: form.produto === p.id ? "#FFFFFF" : INK }} className="text-[11px] font-medium">
                            {p.label}
                          </span>
                        </button>
                      ))}
                    </div>
                  </div>

                  {/* Estadia ou Viagem de retorno */}
                  <div className="mb-5">
                    <p className="text-xs uppercase mb-2" style={{ color: INK_SOFT }}>
                      Tipo de registro
                    </p>
                    <div className="grid grid-cols-2 gap-2">
                      {[
                        { id: "estadia", label: "🅿️ Estadia" },
                        { id: "retorno", label: "🔄 Retorno Filial" },
                      ].map((t) => (
                        <button
                          key={t.id}
                          onClick={() => setForm((f) => ({ ...f, tipo: t.id }))}
                          className="py-3 rounded-md text-[12px] font-medium"
                          style={{
                            background: form.tipo === t.id ? "#3F6B4F" : "#FFFFFF",
                            color: form.tipo === t.id ? "#FFFFFF" : INK,
                            border: `1.5px solid ${form.tipo === t.id ? "#3F6B4F" : RULE}`,
                          }}
                        >
                          {t.label}
                        </button>
                      ))}
                    </div>
                  </div>

                  {/* Fields */}
                  {(form.tipo === "retorno"
                    ? ["nfe", "cte", "viagem", "centro", "peso", "transportadora", "motorista", "telefone", "placa", "uf", "origem", "destino"]
                    : ["chegada", "descarga", "nfe", "cte", "viagem", "centro", "peso", "transportadora", "motorista", "telefone", "placa", "uf", "origem", "destino"]
                  ).map((field) => (
                    <div key={field} className="mb-4">
                      <label className="block text-xs uppercase mb-1.5" style={{ color: INK_SOFT }}>
                        {field === "chegada"
                          ? "Chegada"
                          : field === "descarga"
                          ? "Data e hora da descarga"
                          : field === "nfe"
                          ? "Número da NFe"
                          : field === "cte"
                          ? "Número do CTe"
                          : field === "viagem"
                          ? "DT Original (Nº da viagem contratada)"
                          : field === "centro"
                          ? "Centro"
                          : field === "peso"
                          ? "Peso conforme CTe/NFe"
                          : field === "transportadora"
                          ? "Nome da Transportadora"
                          : field === "motorista"
                          ? "Nome do Motorista"
                          : field === "telefone"
                          ? "Telefone / WhatsApp"
                          : field === "placa"
                          ? "Placa do Cavalo"
                          : field === "uf"
                          ? "UF"
                          : field === "origem"
                          ? "Origem - Expedidor do CTe"
                          : "Destino"}
                      </label>
                      {(field === "viagem" || field === "centro") && (
                        <p className="text-[11px] mb-1.5" style={{ color: INK_SOFT }}>
                          {field === "viagem"
                            ? '📄 No CT-e, procure a linha "VIAGEM: XXXX/YYYYYYYY" — use o número DEPOIS da barra (ex: 22612533)'
                            : '📄 No CT-e, na mesma linha "VIAGEM: XXXX/YYYYYYYY" — use o número ANTES da barra (ex: 2530)'}
                        </p>
                      )}
                      {field === "peso" && (
                        <p className="text-[11px] mb-1.5" style={{ color: INK_SOFT }}>
                          ⚖️ Use vírgula e 2 casas decimais (ex: 50,00 = 50 toneladas = 50.000 kg)
                        </p>
                      )}
                      <input
                        type={
                          field.includes("chegada") || field.includes("descarga")
                            ? "datetime-local"
                            : field === "telefone"
                            ? "tel"
                            : field === "peso"
                            ? "text"
                            : "text"
                        }
                        inputMode={field === "peso" ? "decimal" : undefined}
                        placeholder={field === "telefone" ? "(00) 00000-0000" : field === "peso" ? "Ex: 50,00" : field === "uf" ? "Ex: TO" : undefined}
                        maxLength={field === "uf" ? 2 : undefined}
                        style={field === "uf" ? { ...inputStyle, textTransform: "uppercase" } : inputStyle}
                        value={form[field]}
                        onChange={update(field)}
                        className="w-full rounded-md px-3 py-2.5"
                      />
                    </div>
                  ))}

                  <div className="mb-4">
                    <label className="block text-xs uppercase mb-1.5" style={{ color: INK_SOFT }}>
                      Motivo da Ocorrência
                    </label>
                    <textarea rows={2} value={form.motivo} onChange={update("motivo")} className="w-full rounded-md px-3 py-2.5" style={{ ...inputStyle, resize: "none" }} />
                  </div>

                  <div className="mb-4">
                    <span className="text-xs uppercase mb-1.5 block" style={{ color: INK_SOFT }}>
                      Anexo PDF *
                    </span>
                    <p className="text-[11px] mb-1.5" style={{ color: INK_SOFT }}>
                      📎 O anexo deve conter: <strong>CT-e, comprovante de agendamento, comprovante de marcação e ticket de descarga</strong>. Documentos incompletos ou ILEGÍVEIS estão sujeitos a rejeição.
                    </p>
                    <div className="flex items-center justify-between rounded-md px-3 py-2.5 mb-2" style={inputStyle}>
                      <span className="text-sm truncate" style={{ color: file ? INK : INK_SOFT }}>
                        {file ? file.name : "Nenhum arquivo selecionado"}
                      </span>
                      {file && (
                        <button type="button" onClick={() => setFile(null)}>
                          <X size={15} color={INK_SOFT} />
                        </button>
                      )}
                    </div>
                    <div className="grid grid-cols-2 gap-2">
                      <label className="relative flex items-center justify-center gap-1.5 rounded-md py-2.5 text-sm font-medium" style={{ ...inputStyle, cursor: "pointer" }}>
                        📎 Escolher arquivo
                        <input
                          type="file"
                          accept="application/pdf,image/*"
                          onChange={(e) => setFile(e.target.files?.[0] || null)}
                          style={{ position: "absolute", width: 1, height: 1, opacity: 0 }}
                        />
                      </label>
                      <label className="relative flex items-center justify-center gap-1.5 rounded-md py-2.5 text-sm font-medium" style={{ ...inputStyle, cursor: "pointer" }}>
                        📷 Tirar foto
                        <input
                          type="file"
                          accept="image/*"
                          capture="environment"
                          onChange={(e) => setFile(e.target.files?.[0] || null)}
                          style={{ position: "absolute", width: 1, height: 1, opacity: 0 }}
                        />
                      </label>
                    </div>
                  </div>

                  {errors.length > 0 && <p style={{ background: "#F3E1DA", color: "#A8442B" }} className="rounded-md px-3 py-2.5 mb-4 text-sm">Preencha todos os campos obrigatórios.</p>}
                  {submitError && <p style={{ background: "#F3E1DA", color: "#A8442B" }} className="rounded-md px-3 py-2.5 mb-4 text-sm">{submitError}</p>}

                  <button onClick={handleSubmit} disabled={submitting} className="w-full rounded-md py-3 font-semibold text-white" style={{ background: selectedProduct ? selectedProduct.color : "#3F6B4F", opacity: submitting ? 0.7 : 1 }}>
                    {submitting ? "ENVIANDO..." : "ENVIAR REGISTRO"}
                  </button>
                </div>
                <Perforation />
              </div>
            )}

            {/* Confirmation */}
            {lastTicket && (
              <div className="relative mb-6">
                <Perforation top />
                <div
                  style={{
                    background: lastTicket.offline ? "#FBF0DC" : "#DFE6DE",
                    border: lastTicket.offline ? "1px solid #E0C270" : "1px solid #3F6B4F",
                  }}
                  className="rounded-lg px-5 py-6"
                >
                  <p style={{ color: lastTicket.offline ? "#8A6A1F" : "#3F6B4F", fontWeight: "600" }} className="text-sm mb-3">
                    {lastTicket.offline
                      ? "📴 REGISTRO SALVO NO CELULAR (sem internet)"
                      : `✓ REGISTRO Nº ${lastTicket.numero} ENVIADO`}
                  </p>
                  <ul style={{ color: lastTicket.offline ? "#6B551C" : "#2B4030" }} className="text-[13px] space-y-1">
                    {lastTicket.offline && <li>→ Será enviado automaticamente assim que o celular pegar sinal</li>}
                    <li>→ {lastTicket.offline ? "Guardado" : "Enviado"} em {lastTicket.enviadoEm}</li>
                    <li>→ Arquivo: {lastTicket.arquivo}</li>
                    {lastTicket.gps && <li>→ GPS: {lastTicket.gps.lat}, {lastTicket.gps.lng}</li>}
                  </ul>
                </div>
                <Perforation />
              </div>
            )}

            <p
              className="text-center text-[11px] mt-2 mb-4"
              style={{ color: INK_SOFT }}
            >
              Desenvolvido por ALEXSANDER FABRICIO
            </p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<PatioApp />);
  </script>
</body>
</html>
